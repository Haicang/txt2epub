<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Txt2EPUB</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand-block">
          <h1>Txt2EPUB</h1>
          <p data-i18n="subtitle">本地 TXT 与 EPUB 互转</p>
        </div>
        <div class="mode-switch" role="tablist" aria-label="转换模式" data-i18n-aria="conversionMode">
          <button id="txtModeTab" class="mode-tab mode-tab-txt is-active" type="button" role="tab" aria-selected="true" aria-controls="txtToEpubPanel" data-mode="txt2epub" data-i18n="txtToEpub">TXT 转 EPUB</button>
          <button id="epubModeTab" class="mode-tab mode-tab-epub" type="button" role="tab" aria-selected="false" aria-controls="epubToTxtPanel" data-mode="epub2txt" data-i18n="epubToTxt">EPUB 转 TXT</button>
        </div>
        <div class="topbar-actions">
          <label class="language-switcher">
            <span data-i18n="uiLanguage">网页语言</span>
            <select id="webLanguage" aria-label="网页语言" data-i18n-aria="uiLanguage">
              <option value="zh-CN">中文</option>
              <option value="en">English</option>
            </select>
          </label>
        </div>
      </header>

      <section id="txtToEpubPanel" class="workspace mode-panel" role="tabpanel" aria-label="TXT 转 EPUB 工作区" data-i18n-aria="txtWorkspace">
        <form class="editor-pane" id="bookForm">
          <fieldset>
            <legend data-i18n="fileLegend">文件</legend>
            <label class="file-picker">
              <span data-i18n="txtFile">TXT 文件</span>
              <input id="txtFile" type="file" accept=".txt,text/plain">
            </label>
            <label>
              <span data-i18n="textEncoding">文本编码</span>
              <select id="encoding">
                <option value="auto" data-i18n="autoDetect">自动识别</option>
                <option value="utf-8">UTF-8</option>
                <option value="gb18030">GBK / GB2312 / GB18030</option>
                <option value="big5">BIG5</option>
                <option value="utf-16le">UTF-16 LE</option>
                <option value="utf-16be">UTF-16 BE</option>
              </select>
            </label>
            <label class="file-picker">
              <span data-i18n="coverImage">封面图片</span>
              <input id="coverFile" type="file" accept="image/png,image/jpeg,image/gif,image/svg+xml">
            </label>
            <button id="convertBtn" class="primary-action form-action" type="button" disabled data-i18n="generate">生成 EPUB</button>
          </fieldset>

          <fieldset>
            <legend data-i18n="metadataLegend">元数据</legend>
            <label>
              <span data-i18n="bookTitle">书名</span>
              <input id="title" type="text" autocomplete="off" placeholder="自动使用文件名" data-i18n-placeholder="titlePlaceholder">
            </label>
            <label>
              <span data-i18n="author">作者</span>
              <input id="author" type="text" autocomplete="off" placeholder="未知作者" data-i18n-placeholder="authorPlaceholder">
            </label>
            <label>
              <span data-i18n="bookLanguage">语言</span>
              <select id="language">
                <option value="auto" data-i18n="autoDetect">自动识别</option>
                <option value="zh-CN" data-i18n="chinese">中文</option>
                <option value="en">English</option>
              </select>
            </label>
            <label>
              <span data-i18n="frontMatterTitle">前置内容标题</span>
              <input id="frontMatterTitle" type="text" autocomplete="off" placeholder="默认：开头" data-i18n-placeholder="frontMatterTitlePlaceholder">
            </label>
            <label>
              <span data-i18n="publisher">出版者</span>
              <input id="publisher" type="text" autocomplete="off">
            </label>
            <label>
              <span data-i18n="description">简介</span>
              <textarea id="description" rows="5"></textarea>
            </label>
          </fieldset>
        </form>

        <aside class="preview-pane" aria-label="转换预览" data-i18n-aria="preview">
          <div class="status-strip">
            <div>
              <span class="metric-label" data-i18n="chapters">章节</span>
              <strong id="chapterCount">0</strong>
            </div>
            <div>
              <span class="metric-label" data-i18n="encoding">编码</span>
              <strong id="encodingLabel" data-i18n="notSelected">未选择</strong>
            </div>
            <div>
              <span class="metric-label" data-i18n="size">大小</span>
              <strong id="fileSize">-</strong>
            </div>
          </div>
          <div class="preview-list-wrap">
            <h2 data-i18n="toc">目录</h2>
            <ol id="chapterList" class="chapter-list" data-empty="暂无目录"></ol>
          </div>
          <output id="status" class="status" role="status" data-i18n="selectTxt">请选择 TXT 文件</output>
        </aside>
      </section>

      <section id="epubToTxtPanel" class="epub-workspace mode-panel" role="tabpanel" aria-label="EPUB 转 TXT 工作区" data-i18n-aria="epubWorkspace" hidden>
        <div class="epub-pane">
          <fieldset>
            <legend data-i18n="epubToTxt">EPUB 转 TXT</legend>
            <label class="file-picker">
              <span data-i18n="epubFile">EPUB 文件</span>
              <input id="epubFile" type="file" accept=".epub,application/epub+zip">
            </label>
            <button id="epubConvertBtn" class="primary-action form-action" type="button" disabled data-i18n="exportTxt">导出 TXT</button>
            <output id="epubStatus" class="status" role="status" data-i18n="selectEpub">请选择 EPUB 文件</output>
          </fieldset>
        </div>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
